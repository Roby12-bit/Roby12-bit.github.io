<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeRPG - Quest Board</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/themes.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <a href="../../index.html" class="btn-plutitor-inapoi">
      ⬅ Toate Proiectele
    </a>

    <div
      class="max-w-[1600px] mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-screen lg:overflow-hidden"
    >
      <!-- SHARED LEFT SIDEBAR -->
      <aside
        class="lg:col-span-3 bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between h-full"
      >
        <div>
          <div class="text-center pb-6 border-b border-slate-800">
            <div
              class="relative w-24 h-24 mx-auto mb-3 rounded-full border-4 border-indigo-500 bg-slate-800 flex items-center justify-center text-4xl shadow-lg shadow-indigo-500/20"
            >
              🧙‍♂️
            </div>
            <h2 class="text-xl font-bold tracking-wide">Hero Player</h2>
            <p class="text-slate-400 text-sm italic">Class: Code Warrior</p>
          </div>

          <div class="mt-6 space-y-2">
            <div
              class="flex justify-between items-center text-sm font-semibold"
            >
              <span class="text-amber-400 tracking-wider"
                >LEVEL <span id="user-level">1</span></span
              >
              <span class="text-slate-400"
                ><span id="current-xp">0</span> /
                <span id="next-level-xp">100</span> XP</span
              >
            </div>
            <div
              class="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700"
            >
              <div
                id="xp-progress-bar"
                class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full w-0 transition-all duration-300"
              ></div>
            </div>
          </div>

          <nav class="mt-8 space-y-2">
            <a
              href="index.html"
              class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-white font-medium rounded-xl transition"
            >
              <span>📊</span> Dashboard
            </a>
            <a
              href="quests.html"
              class="flex items-center gap-3 px-4 py-3 bg-slate-800 text-white font-medium rounded-xl border border-slate-700 transition"
            >
              <span>⚔️</span> Quests
            </a>
            <a
              href="stats.html"
              class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-white font-medium rounded-xl transition"
            >
              <span>📈</span> Stats & Analytics
            </a>
            <a
              href="settings.html"
              class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 hover:text-white font-medium rounded-xl transition"
            >
              <span>⚙️</span> Settings
            </a>
          </nav>
        </div>
        <div class="text-xs text-slate-500 text-center mt-6">
          LifeRPG v1.0.0
        </div>
      </aside>

      <!-- QUEST MANAGER -->
      <main
        class="lg:col-span-9 grid grid-cols-1 md:grid-cols-12 gap-6 lg:overflow-y-auto h-full pr-0 lg:pr-2"
      >
        <!-- QUEST CREATOR -->
        <section
          class="md:col-span-5 bg-slate-900 border border-slate-800 rounded-2xl p-5 h-fit sticky top-0"
        >
          <h3
            class="text-lg font-bold tracking-wide flex items-center gap-2 mb-4 text-indigo-400"
          >
            <span>📜</span> Forge New Quest
          </h3>
          <form
            id="quest-form"
            onsubmit="createCustomQuest(event)"
            class="space-y-4 text-sm"
          >
            <div>
              <label
                class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                >Quest Title</label
              >
              <input
                type="text"
                id="q-title"
                required
                placeholder="e.g., Study JavaScript"
                class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200"
              />
            </div>
            <div>
              <label
                class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                >Objective Description</label
              >
              <textarea
                id="q-desc"
                placeholder="Briefly describe your objective details..."
                class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200 h-16 resize-none"
              ></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label
                  class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                  >Difficulty</label
                >
                <select
                  id="q-difficulty"
                  class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200 cursor-pointer"
                >
                  <option value="Trivial">🟢 Trivial</option>
                  <option value="Medium" selected>🟠 Medium</option>
                  <option value="Hard">🔴 Hard</option>
                  <option value="Boss Fight">💀 Boss Fight</option>
                </select>
              </div>
              <div>
                <label
                  class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                  >XP Reward</label
                >
                <input
                  type="number"
                  id="q-xp"
                  required
                  min="1"
                  max="500"
                  value="25"
                  class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200"
                />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label
                  class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                  >Category</label
                >
                <input
                  type="text"
                  id="q-category"
                  placeholder="e.g., Coding, Health"
                  class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200"
                />
              </div>
              <div>
                <label
                  class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                  >Due Date</label
                >
                <input
                  type="date"
                  id="q-date"
                  class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:outline-none focus:border-indigo-500 text-slate-200 cursor-pointer"
                />
              </div>
            </div>
            <button
              type="submit"
              class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 font-bold tracking-wide rounded-xl shadow-lg shadow-indigo-600/20 transition cursor-pointer mt-2"
            >
              ➕ Accept Quest
            </button>
          </form>
        </section>

        <!-- ACTIVE QUESTS -->
        <section class="md:col-span-7 space-y-4">
          <div
            class="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-2xl"
          >
            <h3 class="text-lg font-bold tracking-wide flex items-center gap-2">
              <span>⚔️</span> Quest Logbook
            </h3>
            <span
              id="quest-count"
              class="text-xs bg-slate-950 border border-slate-800 px-3 py-1 rounded-full font-mono text-indigo-400"
              >0 Active</span
            >
          </div>

          <!-- Generated Quest -->
          <div id="dynamic-quest-list" class="space-y-3"></div>
        </section>
      </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/quests.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
