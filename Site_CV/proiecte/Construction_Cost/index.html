<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construction Cost Estimator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="estimator-container">
      <h2>Construction Cost Estimator</h2>

      <form id="estimatorForm">
        <div class="input-group">
          <label for="projectType">Project Type:</label>
          <select id="projectType" required>
            <option value="800">Residential - Basic (€800/m²)</option>
            <option value="1200">Commercial - Standard (€1200/m²)</option>
            <option value="1500">Industrial - Heavy (€1500/m²)</option>
          </select>
        </div>

        <div class="input-group">
          <label for="area">Total Area (m²):</label>
          <input
            type="number"
            id="area"
            placeholder="e.g., 150"
            min="1"
            required
          />
        </div>

        <div class="input-group">
          <label for="materialQuality">Material Quality:</label>
          <select id="materialQuality" required>
            <option value="1.0">Standard (1.0x)</option>
            <option value="1.25">Premium (1.25x)</option>
            <option value="1.60">Luxury (1.60x)</option>
          </select>
        </div>

        <button type="submit">Calculate Estimate</button>
      </form>

      <div id="results" class="results-box hidden">
        <h3>Estimated Breakdown</h3>
        <p>
          <strong>Total Estimated Cost:</strong> <span id="totalCost">€0</span>
        </p>
        <hr />
        <p>Materials (60%): <span id="materialCost">€0</span></p>
        <p>Labor (40%): <span id="laborCost">€0</span></p>
      </div>
    </div>
    <a href="../../index.html" class="btn-plutitor-inapoi"
      >⬅ Toate Proiectele</a
    >
    <script src="script.js"></script>
  </body>
</html>
